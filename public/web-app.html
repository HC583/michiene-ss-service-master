<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <title>道エネSSサービスマスター WEBアプリ版</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #fff3df;
        color: #172033;
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
        background:
          linear-gradient(135deg, rgba(255, 183, 77, 0.18) 25%, transparent 25%),
          linear-gradient(225deg, rgba(255, 214, 153, 0.32) 25%, transparent 25%),
          linear-gradient(45deg, rgba(255, 154, 92, 0.1) 25%, transparent 25%),
          linear-gradient(315deg, rgba(255, 204, 128, 0.2) 25%, #fff8ec 25%);
        background-position: 18px 0, 18px 0, 0 0, 0 0;
        background-size: 36px 36px;
      }

      .app-shell {
        display: grid;
        min-height: 100vh;
        grid-template-rows: auto 1fr;
        gap: 14px;
        padding: 18px;
      }

      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin: 0 auto;
        width: min(100%, 1840px);
        border: 4px solid #ffffff;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.9);
        padding: 12px 18px;
        box-shadow: 0 18px 40px rgba(217, 119, 6, 0.16);
      }

      .brand {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 14px;
      }

      .brand img {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        object-fit: contain;
        background: #fff7ed;
        box-shadow: inset 0 0 0 3px #fed7aa;
      }

      .brand-title {
        margin: 0;
        font-size: clamp(24px, 3vw, 44px);
        font-weight: 900;
        line-height: 1;
        color: #2563eb;
      }

      .brand-subtitle {
        margin: 5px 0 0;
        font-size: clamp(13px, 1.2vw, 18px);
        font-weight: 800;
        color: #ea580c;
      }

      .badge {
        flex: 0 0 auto;
        border-radius: 999px;
        background: linear-gradient(90deg, #f97316, #facc15);
        padding: 10px 18px;
        color: #ffffff;
        font-size: clamp(14px, 1.3vw, 18px);
        font-weight: 900;
        box-shadow: 0 10px 22px rgba(234, 88, 12, 0.24);
      }

      .stage {
        display: grid;
        min-height: 0;
        place-items: center;
      }

      .game-frame {
        width: min(100%, calc((100vh - 120px) * 16 / 9));
        height: min(calc(100vh - 120px), calc(100vw * 9 / 16));
        min-height: 620px;
        overflow: hidden;
        border: 6px solid #ffffff;
        border-radius: 34px;
        background: #ffffff;
        box-shadow: 0 26px 70px rgba(15, 23, 42, 0.22);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
        }

        .app-shell {
          min-height: 100dvh;
          padding: 10px;
        }

        .app-header {
          align-items: flex-start;
          border-radius: 22px;
        }

        .badge {
          display: none;
        }

        .brand img {
          width: 48px;
          height: 48px;
        }

        .game-frame {
          width: 100%;
          height: calc(100dvh - 106px);
          min-height: 560px;
          border-width: 4px;
          border-radius: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header" aria-label="アプリ情報">
        <div class="brand">
          <img src="/staff.png" alt="" />
          <div>
            <h1 class="brand-title">道エネサービスマスター</h1>
            <p class="brand-subtitle">北海道のサービスステーション育成ゲーム</p>
          </div>
        </div>
      </header>
      <section class="stage" aria-label="ゲーム画面">
        <div class="game-frame">
          <iframe src="/" title="道エネサービスマスター"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
