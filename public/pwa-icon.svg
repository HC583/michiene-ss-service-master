<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="appBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf2"/>
      <stop offset="0.58" stop-color="#fff3e4"/>
      <stop offset="1" stop-color="#ffe6bf"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#92400e" flood-opacity=".18"/>
    </filter>
    <filter id="textSoft" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="1.5" flood-color="#ffffff" flood-opacity=".85"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#appBg)"/>
  <path d="M48 396h416" stroke="#f97316" stroke-width="18" stroke-linecap="round" opacity=".12"/>
  <path d="M64 432h330" stroke="#2563eb" stroke-width="12" stroke-linecap="round" opacity=".10"/>

  <g filter="url(#cardShadow)">
    <rect x="42" y="72" width="160" height="292" rx="42" fill="#ffffff"/>
    <image href="staff.png" x="53" y="82" width="138" height="270" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g filter="url(#textSoft)">
    <text x="226" y="164" font-family="Hiragino Sans, Yu Gothic, Meiryo, Arial, sans-serif" font-size="70" font-weight="900" fill="#2854e7">道エネSS</text>
    <text x="226" y="250" font-family="Hiragino Sans, Yu Gothic, Meiryo, Arial, sans-serif" font-size="59" font-weight="900" fill="#f97316">サービス</text>
    <text x="226" y="322" font-family="Hiragino Sans, Yu Gothic, Meiryo, Arial, sans-serif" font-size="59" font-weight="900" fill="#f97316">マスター</text>
  </g>

  <text x="256" y="430" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, Meiryo, Arial, sans-serif" font-size="26" font-weight="900" fill="#334155">北海道の暮らしを支える</text>
</svg>
